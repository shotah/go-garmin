name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Build CLI
        run: go build -o bin/garmin ./cmd/garmin

      - name: Validate endpoints
        run: go run ./cmd/validate-endpoints

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Test
        # Unit tests only. VCR integration tests need: go test -tags=integration
        run: go test ./... -count=1 -timeout 5m
